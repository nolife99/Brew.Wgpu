name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, e.g. 29.0.0  or  29.0.0-rc.1"
        required: true
      wgpu_repo:
        description: "wgpu-native repo to build (defaults to the memory-hints fork; set gfx-rs/wgpu-native for a stock build without hints)"
        required: false
        default: "nolife99/wgpu-native"
      wgpu_ref:
        description: "git ref to build (tag / branch / sha) — pin to a tag for a reproducible release"
        required: false
        default: "memory-hints"
      dry_run:
        description: "Pack only — do NOT push to nuget.org (use this to test packing)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  native:
    permissions:
      contents: write
    uses: ./.github/workflows/build-wgpu-native.yml
    with:
      wgpu_repo: ${{ inputs.wgpu_repo }}
      wgpu_ref: ${{ inputs.wgpu_ref }}

  publish:
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download native runtimes
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*      # each contains runtimes/<rid>/native/<lib>
          path: .
          merge-multiple: true    # reconstructs a single runtimes/ tree at the repo root

      - name: Show assembled runtimes/
        run: find runtimes -type f | sort

      - name: Pack
        run: dotnet pack Brew.Wgpu.csproj -c Release -p:Version="${{ inputs.version }}" -o artifacts

      - name: List package
        run: ls -l artifacts

      - name: Push to nuget.org
        if: ${{ !inputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            artifacts/*.nupkg
          if-no-files-found: error
