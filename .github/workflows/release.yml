name: release

# Manually-triggered publish.
#   1. builds wgpu-native for every RID (reuses build-wgpu-native.yml)
#   2. packs Brew.Wgpu (managed assembly + bundled runtimes/<rid>/native/*)
#   3. pushes the .nupkg (+ .snupkg) to nuget.org
#
# One-time prerequisite — add a repository secret named NUGET_API_KEY:
#   Settings -> Secrets and variables -> Actions -> New repository secret
#   Name: NUGET_API_KEY   Value: <your nuget.org API key>

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, e.g. 29.0.0  or  29.0.0-rc.1"
        required: true
      wgpu_repo:
        description: "wgpu-native repo to build (use your fork to get the memory-hints build)"
        required: false
        default: "gfx-rs/wgpu-native"
      wgpu_ref:
        description: "git ref to build (tag / branch / sha)"
        required: false
        default: "trunk"
      dry_run:
        description: "Pack only — do NOT push to nuget.org (use this to test packing)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # 1) Native binaries for every RID. Reuses the standalone build workflow,
  #    which uploads one artifact per RID named runtime-<rid> containing
  #    runtimes/<rid>/native/<lib>.
  native:
    uses: ./.github/workflows/build-wgpu-native.yml
    with:
      wgpu_repo: ${{ inputs.wgpu_repo }}
      wgpu_ref: ${{ inputs.wgpu_ref }}

  # 2) Pack the managed project together with the natives, then push.
  publish:
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download native runtimes
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*      # each contains runtimes/<rid>/native/<lib>
          path: .
          merge-multiple: true    # reconstructs a single runtimes/ tree at the repo root

      - name: Show assembled runtimes/
        run: find runtimes -type f | sort 

      # NOTE: pack compiles the project. Until the decompiled wrapper is green
      # (see BUILD-NOTES.md) this step will fail — that is expected; the pathway
      # itself is complete. Use dry_run while finishing the wrapper.
      - name: Pack
        run: dotnet pack Brew.Wgpu.csproj -c Release -p:Version="${{ inputs.version }}" -o artifacts

      - name: List package
        run: ls -l artifacts

      - name: Push to nuget.org
        if: ${{ !inputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/*.nupkg"  --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "artifacts/*.snupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
